services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: easybiz
      POSTGRES_USER: easybiz
      POSTGRES_PASSWORD: easybiz
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U easybiz"]
      interval: 3s
      retries: 10

  web:
    build: .
    volumes:
      - .:/app
    working_dir: /app
    ports:
      - "8000:8000"
    environment:
      DJANGO_SECRET_KEY: dev-secret-key-change-in-production
      DEBUG: "true"
      ALLOWED_HOSTS: "localhost,127.0.0.1"
      DB_NAME: easybiz
      DB_USER: easybiz
      DB_PASSWORD: easybiz
      DB_HOST: db
      DB_PORT: "5432"
      DJANGO_SUPERUSER_USERNAME: admin
      DJANGO_SUPERUSER_EMAIL: admin@example.com
      DJANGO_SUPERUSER_PASSWORD: admin
      ENABLE_AI_MATCHING: "false"
      ANTHROPIC_API_KEY: ""
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    environment:
      VITE_API_TARGET: http://web:8000
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - web

volumes:
  postgres_data:
